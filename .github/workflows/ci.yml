name: CI/CD

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
      - main
  schedule:
    - cron: "30 4 * * *" # Daily at 04:30 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  MAIN_PYTHON_VERSION: "3.12"
  PACKAGE_NAME: "ansys-mechanical-mcp"
  # DOCUMENTATION_CNAME: "mechanical-mcp.docs.pyansys.com"

jobs:

  # ── Code style ────────────────────────────────────────────────────────────
  code-style:
    name: "Code style checks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: "Configure pip for private PyPI"
        run: |
          pip config set global.extra-index-url \
            https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/

      - name: "Run PyAnsys code style checks"
        uses: ansys/actions/code-style@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          checkout: false
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  # ── Unit tests ────────────────────────────────────────────────────────────
  tests:
    name: "Test Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: [code-style]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: "Configure pip for private PyPI"
        run: |
          pip config set global.extra-index-url \
            https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/

      - name: "Install dependencies"
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Run unit tests"
        run: |
          pytest -m "not integration" \
            --cov=ansys.mechanical.mcp \
            --cov-report=xml \
            --cov-report=term-missing

      - name: "Upload coverage reports"
        if: matrix.python-version == env.MAIN_PYTHON_VERSION && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml
          retention-days: 7

  # ── Package library ──────────────────────────────────────────────────────
  package:
    name: "Package library"
    needs: [tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: "Configure pip for private PyPI"
        run: |
          pip config set global.extra-index-url \
            https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/

      - name: "Build library source and wheel artifacts"
        uses: ansys/actions/build-library@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        env:
          UV_EXTRA_INDEX_URL: "https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/"
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          checkout: false

  # ── Docker build & push ──────────────────────────────────────────────────
