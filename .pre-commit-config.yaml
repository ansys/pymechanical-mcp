# Pre-commit hooks for code quality
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 01a675ea018f2fb714478a5ffb83fcea8374bb06  # frozen: v0.15.21
    hooks:
      # Run the linter.
      - id: ruff-check
      # Run the formatter.
      - id: ruff-format

  # Add copyright statement to files
  - repo: https://github.com/ansys/pre-commit-hooks
    rev: 55c5b6a5439abd847613579c6924da750e8b78b2  # frozen: v0.8.0
    hooks:
    - id: add-license-headers
      args:
      - --start_year=2026
      - --custom_license=Apache-2.0

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
        exclude: ^\.devcontainer/
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  # Type checking with mypy (official mirror)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 0cbe8f6e54466b1b48f9d41f44abb4d06c061b5e  # frozen: v2.2.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        exclude: ^(tests/|\.venv/|venv/)
        additional_dependencies:
          - types-tabulate

  # Security checks with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']
        exclude: ^tests/

  # Spell checking with typos
  - repo: https://github.com/crate-ci/typos
    rev: 96d9af6217dc2855210655af7e1ff19d23d4e593  # frozen: v1
    hooks:
      - id: typos
        args: ["--config", "doc/styles/typos.toml"]
        exclude: "(^doc/styles/config/vocabularies)|(^.github/labels.yml$)"
