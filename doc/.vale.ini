# Core settings
# =============

# Location of our `styles`
StylesPath = "styles"

# The options are `suggestion`, `warning`, or `error` (defaults to "warning").
MinAlertLevel = warning

# By default, `code` and `tt` are ignored.
IgnoredScopes = code, tt

# By default, `script`, `style`, `pre`, and `figure` are ignored.
SkippedScopes = script, style, pre, figure

# WordTemplate specifies what Vale considers to be an individual word.
WordTemplate = \b(?:%s)\b

# List of packages to use for our guidelines
Packages = Google

# Define the Ansys vocabulary
Vocab = ANSYS

[*.{md,rst}]

# By default, `class`, `func`, and `exc` are ignored
TokenIgnores = (:class:`.*`|:func:`.*`|:exc:`.*`)

# Apply the following styles
BasedOnStyles = Vale, Google
Vale.Terms = NO

TokenIgnores = (:(func|class|meth|attr|py):`(?:.|\n)*?`)|(<.*>)|(\b\w+_\w+\b)

# Removing Google-specific rule - Not applicable under some circumstances
Google.Colons = NO
